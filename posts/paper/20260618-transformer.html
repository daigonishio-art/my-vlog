<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attention Is All You Need を読んで - ひとりと、だれかと、できること。</title>
    <link rel="icon" href="https://img.icons8.com/material-outlined/24/22c55e/leaf.png" type="image/png">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;500&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-color: #fcfcfc;
            --text-color: #333333;
            --meta-color: #999999;
            --tag-bg: #f0f0f0;
            --tag-text: #666666;
            --bar-color: #333333;
            --sparkle-color: #22c55e;
        }

        [data-theme="dark"] {
            --bg-color: #121212;
            --text-color: #e0e0e0;
            --meta-color: #777777;
            --tag-bg: #2a2a2a;
            --tag-text: #b0b0b0;
            --bar-color: #22c55e;
            --sparkle-color: #22c55e;
        }

        body {
            font-family: "Noto Serif JP", "Hiragino Mincho ProN", "serif";
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 2.0;
            letter-spacing: 0.08em;
            margin: 0;
            padding: 0;
            transition: background-color 0.4s ease, color 0.4s ease;
        }

        .progress-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 3px;
            background-color: transparent;
            z-index: 1000;
        }
        .progress-bar {
            height: 100%;
            width: 0%;
            background-color: var(--bar-color);
            transition: width 0.1s ease-out;
        }

        .container {
            max-width: 650px;
            margin: 0 auto;
            padding: 80px 24px;
            position: relative;
        }

        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 60px;
        }

        .back-to-top {
            text-decoration: none;
            color: var(--meta-color);
            font-size: 0.9rem;
        }
        .back-to-top:hover { opacity: 0.6; }

        .theme-toggle {
            background-color: var(--tag-bg);
            border: none;
            color: var(--text-color);
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.75rem;
            letter-spacing: 0.05em;
            cursor: pointer;
            font-family: inherit;
            transition: background-color 0.3s, color 0.3s;
        }
        .theme-toggle:hover { opacity: 0.8; }

        .post-meta {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 0.8rem;
            margin-bottom: 16px;
        }
        .post-date { color: var(--meta-color); }
        .post-category {
            background-color: var(--tag-bg);
            color: var(--tag-text);
            padding: 2px 8px;
            border-radius: 4px;
        }

        .post-title {
            font-size: 1.6rem;
            font-weight: 500;
            line-height: 1.5;
            margin: 0 0 40px 0;
        }
        
        .post-content {
            font-size: 0.95rem;
            margin-bottom: 80px;
        }
        .post-content p {
            margin-bottom: 32px;
        }

        .clap-area {
            text-align: center;
            border-top: 1px dashed var(--meta-color);
            padding-top: 40px;
            margin-top: 60px;
            position: relative; 
        }

        .clap-btn-wrapper {
            position: relative;
            display: inline-block;
        }

        /* ぷにっと弾むアニメーションを追加したボタン */
        .clap-button {
            background-color: var(--tag-bg);
            border: none;
            color: var(--text-color);
            padding: 12px 26px;
            border-radius: 30px;
            font-size: 0.95rem;
            font-weight: 500;
            letter-spacing: 0.1em;
            cursor: pointer;
            font-family: inherit;
            position: relative;
            z-index: 2;
            outline: none;
            box-shadow: 0 4px 10px rgba(0,0,0,0.03);
        }
        
        /* クラスがついた瞬間にぷにっと揺れる魔法 */
        .clap-button.pop-animation {
            animation: buttonPop 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        @keyframes buttonPop {
            0% { transform: scale(1); }
            30% { transform: scale(0.85); } /* 押されて潰れる */
            60% { transform: scale(1.1); }  /* 反動で少し膨らむ */
            100% { transform: scale(1); }   /* 着地 */
        }

        .clap-count {
            display: block;
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--meta-color);
            margin-top: 14px;
            transition: color 0.2s;
        }
        .clap-count.active {
            color: var(--sparkle-color); /* カウントが増えた瞬間一瞬色を変える */
        }

        /* 重力とランダムサイズに対応した新しいスパークル */
        .sparkle {
            position: absolute;
            background-color: var(--sparkle-color);
            border-radius: 50%;
            z-index: 1;
            pointer-events: none;
            top: 50%;
            left: 50%;
            opacity: 1;
            /* 初速度と重力を再現するアニメーション */
            animation: fireworks 0.7s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
        }

        @keyframes fireworks {
            0% {
                transform: translate(-50%, -50%) translate(0, 0) scale(1);
                opacity: 1;
            }
            40% {
                opacity: 1;
            }
            100% {
                /* X方向にはそのまま進み、Y方向（縦）には重力でグッと下に落ちる */
                transform: translate(-50%, -50%) translate(var(--tx), calc(var(--ty) + 50px)) scale(0);
                opacity: 0;
            }
        }
    </style>
</head>
<body>

    <div class="progress-container">
        <div class="progress-bar" id="progressBar"></div>
    </div>

    <div class="container">
        
        <div class="page-header">
            <a href="../../index.html" class="back-to-top">← index</a>
            <button class="theme-toggle" id="themeToggle">dark</button>
        </div>

        <article>
            <div class="post-meta">
                <div class="post-date">2026.06.18</div>
                <span class="post-category">論文紹介</span>
            </div>
            <h1 class="post-title">Attention Is All You Need を読んで：すべての始まりの論文</h1>
            
            <div class="post-content">
                <p>（以下本文）</p>
                
                <p>Google所属の研究者8人によって2017年に発表されたこの論文は、現在の生成AIや大規模言語モデル（LLM）のすべての根幹となる「Transformer」を提唱した、まさに歴史の転換点とも言える一本です。</p>

                <p>我々人間は普段、言葉を想起して文章を作るときに、無意識的に文脈を選び取っています。この論文が成し遂げたのは、その一見単純な、でもAIにとっては高度な処理を数式の世界に落とし込むことに成功したことです。</p>

            </div>
        </article>

        <div class="clap-area">
            <div class="clap-btn-wrapper" id="clapWrapper">
                <button class="clap-button" id="clapButton">Clap</button>
            </div>
            <div class="clap-count" id="clapCountText"><span id="clapCount">0</span> claps</div>
        </div>

    </div>

    <script>
        // モード切り替え
        const toggleButton = document.getElementById('themeToggle');
        toggleButton.addEventListener('click', () => {
            const currentTheme = document.documentElement.getAttribute('data-theme');
            if (currentTheme === 'dark') {
                document.documentElement.removeAttribute('data-theme');
                toggleButton.textContent = 'dark';
            } else {
                document.documentElement.setAttribute('data-theme', 'dark');
                toggleButton.textContent = 'white';
            }
        });

        // 読了メーター
        window.addEventListener('scroll', () => {
            const scrollTop = window.scrollY;
            const docHeight = document.documentElement.scrollHeight - window.innerHeight;
            const scrollPercent = (scrollTop / docHeight) * 100;
            document.getElementById('progressBar').style.width = scrollPercent + '%';
        });

// --- 拍手カウント保存版のプログラム ---
        const clapButton = document.getElementById('clapButton');
        const clapWrapper = document.getElementById('clapWrapper');
        const clapCountDisplay = document.getElementById('clapCount');
        const clapCountText = document.getElementById('clapCountText');
        
        // 【新機能】ページを開いた瞬間、日記帳（LocalStorage）に過去の記憶があれば読み込む
        let count = parseInt(localStorage.getItem('myClapCount')) || 0;
        clapCountDisplay.textContent = count; // 保存されていた数字を画面に表示

        clapButton.addEventListener('click', () => {
            count++;
            clapCountDisplay.textContent = count;

            // 【新機能】増えた数字を日記帳（LocalStorage）に保存する
            localStorage.setItem('myClapCount', count);

            // ボタン自体をぷにっと弾ませる
            clapButton.classList.remove('pop-animation');
            void clapButton.offsetWidth; 
            clapButton.classList.add('pop-animation');

            // カウントテキストを一瞬光らせる
            clapCountText.classList.add('active');
            setTimeout(() => clapCountText.classList.remove('active'), 200);

            // 物理法則（重力）を持ったランダム火花を噴射
            const sparkleCount = 16;
            for (let i = 0; i < sparkleCount; i++) {
                const sparkle = document.createElement('div');
                sparkle.classList.add('sparkle');

                const size = Math.floor(Math.random() * 10) + 4;
                sparkle.style.width = size + 'px';
                sparkle.style.height = size + 'px';

                const angle = (i / sparkleCount) * 2 * Math.PI + (Math.random() * 0.4 - 0.2);
                const distance = 60 + Math.random() * 40; 
                
                const tx = Math.cos(angle) * distance + 'px';
                const ty = (Math.sin(angle) * distance) - 30 + 'px';
                
                sparkle.style.setProperty('--tx', tx);
                sparkle.style.setProperty('--ty', ty);

                clapWrapper.appendChild(sparkle);

                setTimeout(() => {
                    sparkle.remove();
                }, 700);
            }
        });
    </script>
</body>
</html>
