<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">

    <title>ブログ開設日 - ひとりと、だれかと、できること。</title>
    <link rel="icon" href="https://img.icons8.com/material-outlined/24/22c55e/leaf.png" type="image/png">
    <style>
        body {
            font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", sans-serif;
            background-color: #fcfcfc;
            color: #333333;
            line-height: 1.8;
            letter-spacing: 0.05em;
            margin: 0;
            padding: 0;
        }
        .container {
            max-width: 700px;
            margin: 0 auto;
            padding: 80px 24px;
        }
        /* トップに戻るリンク */

            font-size: 0.9rem;

            margin-bottom: 40px;
        }
        .back-to-top:hover { opacity: 0.6; }

        .post-date { font-size: 0.85rem; color: #999999; margin-bottom: 8px; }
        .post-title { font-size: 1.5rem; font-weight: 500; margin: 0 0 32px 0; }
        
        /* 本文のエリア */
        .post-content { font-size: 0.95rem; color: #333333; }
        .post-content p { margin-bottom: 24px; }
        /* 日記の中の写真をオシャレに、程よい大きさに変える設定 */
        .diary-image {
            display: block;
            width: 100%;
            max-width: 500px; /* ★ここ！横幅を最大500ピクセルに制限します */
            height: auto;      /* 縦横比を崩さないように自動調整 */
            border-radius: 6px; /* 角をほんのり丸くして優しく */

<body>
    <div class="container">
        <a href="index.html" class="back-to-top">← index</a>

        <article>
            <div class="post-date">2026.06.14</div>
            <h1 class="post-title">ブログ開設日</h1>

            <img src="diary-00-photo.HEIC" class="diary-image">
            
            <div class="post-content">
                <p>自分がきれいと思うものを自分で作ってみたくて、ブログという形でそれを表現することにしてみました。</p>
                <p>ここには、日々の他愛のない日記だけでなく、自分が面白いと感じた論文の紹介や、最近熱中しているAI研究の備忘録、勉強の記録、投資のあれこれなどを、自分のペースで書き残していこうと思います。</p>
                <p>何より、大好きなウェブページのデザインを学ぶことができたら嬉しいです。</p>
                <p>心地よい余白を大切にしながら、少しずつ、この場所を育てていけますように。</p>
            </div>
        </article>
    </div>
