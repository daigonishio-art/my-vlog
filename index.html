<!DOCTYPE html>

<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>ひとりと、だれかと、できること。</title>

  <link rel="icon" href="https://img.icons8.com/material-outlined/24/22c55e/leaf.png" type="image/png">

  <!-- 日本語をきれいに読ませるための明朝体 -->

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;500;600&display=swap" rel="stylesheet">

  <style>
    :root {
      --paper: #fcfcfc;
      --ink: #2f2f2f;
      --muted: #8b8b8b;
      --line: #e8e8e8;
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      background: var(--paper);
      color: var(--ink);
      font-family: "Noto Serif JP", serif;
      line-height: 1.9;
      letter-spacing: 0.06em;
    }

    /* =========================
       固定ヘッダー
       ナビを増やすときは、下の <nav> に
       <a href="...">新しいカテゴリ名</a>
       を1行足すだけでOK
    ========================== */

    .site-header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(252, 252, 252, 0.94);
      border-bottom: 1px solid var(--line);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }

    .header-inner {
      width: min(1120px, calc(100% - 48px));
      margin: 0 auto;
    }

    .site-brand {
      display: block;
      padding: 18px 0 10px;
      color: var(--ink);
      font-size: 1.05rem;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-align: center;
      text-decoration: none;
    }

    .site-subtitle {
      display: block;
      margin-top: 2px;
      color: var(--muted);
      font-family: "Helvetica Neue", Arial, sans-serif;
      font-size: 0.68rem;
      font-weight: 400;
      letter-spacing: 0.05em;
    }

    .global-nav {
      display: flex;
      justify-content: center;
      gap: clamp(18px, 3vw, 44px);
      overflow-x: auto;
      padding: 12px 0 15px;
      scrollbar-width: none;
      white-space: nowrap;
    }

    .global-nav::-webkit-scrollbar {
      display: none;
    }

    .global-nav a {
      color: var(--ink);
      font-size: 0.78rem;
      text-decoration: none;
      transition: opacity 0.25s ease;
    }

    .global-nav a:hover {
      opacity: 0.45;
    }

    /* =========================
       トップページ本文
    ========================== */

    .hero {
      width: min(820px, calc(100% - 48px));
      min-height: calc(100vh - 136px);
      margin: 0 auto;
      padding: clamp(110px, 18vh, 180px) 0 96px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .hero-main {
      max-width: 650px;
    }

    .hero-label {
      margin: 0 0 22px;
      color: var(--muted);
      font-family: "Helvetica Neue", Arial, sans-serif;
      font-size: 0.72rem;
      letter-spacing: 0.14em;
    }

    .hero-title {
      margin: 0;
      font-size: clamp(2rem, 5vw, 3.6rem);
      font-weight: 400;
      line-height: 1.55;
      letter-spacing: 0.1em;
    }

    .hero-text {
      max-width: 550px;
      margin: 38px 0 0;
      color: #5d5d5d;
      font-size: 0.95rem;
      line-height: 2.25;
    }

    .hero-guide {
      margin: 80px 0 0;
      padding-top: 22px;
      border-top: 1px solid var(--line);
      color: var(--muted);
      font-family: "Helvetica Neue", Arial, sans-serif;
      font-size: 0.75rem;
      letter-spacing: 0.04em;
    }

    footer {
      width: min(820px, calc(100% - 48px));
      margin: 0 auto;
      padding: 0 0 34px;
      color: #b5b5b5;
      font-family: "Helvetica Neue", Arial, sans-serif;
      font-size: 0.7rem;
      text-align: center;
    }

    @media (max-width: 600px) {
      .header-inner {
        width: min(100% - 32px, 1120px);
      }

      .site-brand {
        padding-top: 15px;
        font-size: 0.92rem;
      }

      .global-nav {
        justify-content: flex-start;
        gap: 24px;
        padding-bottom: 13px;
      }

      .hero {
        width: min(100% - 40px, 820px);
        min-height: calc(100vh - 124px);
        padding-top: 90px;
      }

      .hero-title {
        font-size: 2rem;
      }
    }
  </style>

</head>

<body>

</div>

  </header>

  <main class="hero">

```
  <h1 class="hero-title">
    ひとりと、<br>
    だれかと、<br>
    できること。
  </h1>

  <p class="hero-text">
    論文を読み、技術について考え、<br>

  </p>
</div>

<p class="hero-guide">
  上のメニューから、それぞれの文章へ。
</p>
```

  </main>

  <footer>
    © 2026 ひとりと、だれかと、できること。

</body>
</html>
